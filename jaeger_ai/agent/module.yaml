module: jaeger_ai
slot: mind
version: 1.0.0
# What AgentBridge actually subscribes/publishes (agent/loop/bridge.py):
#   consumes — ChatMessage (/act/chat, operator -> agent), the final
#     leg of SENSE_TRANSCRIPT (/sense/transcript, voice STT -> chat
#     turn), and AgentResponse (/act/response, a surface answering a
#     mid-turn permission prompt the bridge's BusConfirmationProvider
#     raised — best-effort, wired in start() alongside the required two).
#   produces — ChatReply (/sense/chat, tier-1: only the agent replies),
#     AgentState (/sense/agent_state, idle/thinking/error), ToolEvent
#     (/sense/tool) + AgentActivity (/sense/activity, both via the
#     _BusEventAdapter the bridge installs), and AgentRequest
#     (/sense/request, the confirmation-provider prompt half of the
#     AgentResponse round trip above).
consumes: [/act/chat, /sense/transcript, /act/response]
produces: [/sense/chat, /sense/agent_state, /sense/tool, /sense/activity, /sense/request]
# The Mind's tool surface is the ENTIRE dynamic core.tools registry
# (~50+ tools today, changes with skills/config/plugins) — enumerating
# it here would be stale the moment a skill loads. Left empty on
# purpose rather than a snapshot that lies; see
# jaeger_os/core/tools/tool_registry.py:get_tools() for the live list.
tools: []
factory: jaeger_ai.agent.loop.mind_node:make_mind_node
# No single settings-catalog group: the Mind's config IS the instance
# Config (model/display/skills/... — core/instance/schemas.py), not a
# nested slice the way an engine module's own group is. Left empty
# rather than pointing at a slice that doesn't cover what actually
# gets read.
config: ""
# What jaeger_os.agent actually imports at module scope for local
# inference (agent/adapters/local_llama.py's llama-cpp-python backend
# — the LocalLlamaAdapter every offline instance boots through).
# External-model instances (Anthropic/OpenAI/etc.) don't need this,
# but requires_libraries has no OR form yet (same limitation
# kokoro_tts/whisper_stt already carry) — see core/modules.py.
requires_libraries: [llama_cpp]
