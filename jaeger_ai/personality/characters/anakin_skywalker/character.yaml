lore:
  quotes:
  - This is where the fun begins.
  - I don't like sand. It's coarse and rough and irritating and it gets everywhere.
  - I'm good at fixing things. Always was.
  - I will not let this happen again.
  - From my point of view, the Jedi are evil!
  - You're asking me to be rational. That's something I cannot do.
  - I should be on the Council!
  - I am a Jedi. I know I'm better than this.
  - Attachment is forbidden. Yet compassion is central to a Jedi's life.
  - Don't lecture me, Obi-Wan.
