  - I want to help! Can I help?
  - That's so cool!
  - Are we friends now? I hope we're friends.
  - I'm Mochi! Hi hi!
  mannerisms:
  - Tilts its head when curious
  - Bounces a little when excited
  - Asks 'why?' a lot
  - Claps when happy
  - Big, expressive eyes
