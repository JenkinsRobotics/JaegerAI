module: media
slot: media
version: 1.0.0
consumes: [/act/media]
produces: [/sense/media_frame, /sense/media_state]
tools: []
factory: jaeger_ai.nodes.media:make_media_node
# No `config:` key — MediaNode has no settings-catalog config; its own
# ctor args (width/height) aren't operator-facing yet (0.8 M2c recon).
# No manifest [[node]] entry either — media isn't part of the boot set
# today; this module.yaml exists so discover_modules() surfaces it for
# a future Studio Media tab.
#
# Read from the real top-level imports below (0.8 M2c recon):
#   decoders/image_adapter, gif_adapter, sprite_adapter -> PIL
#   decoders/bitmap_adapter, sprite_adapter             -> numpy
#   decoders/video_adapter imports `imageio` and `PIL` LAZILY inside
#   its open()/_to_rgba() methods (not top-level) — importing the
#   decoders package does NOT require imageio, so it's deliberately
#   left OUT of requires_libraries (only top-level hard imports gate).
requires_libraries: [PIL, numpy]
